name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for `actions/deploy-pages` to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys stepping on each other.
concurrency:
  group: "pages"
  cancel-in-progress: false

# PAGES MUST BE ENABLED MANUALLY ONCE before this workflow can deploy:
#   Repo → Settings → Pages → Source = "GitHub Actions"
# The `enablement: true` flag on `actions/configure-pages` tries to do
# this automatically, but on repos with stricter org/repo policies it
# fails with "Resource not accessible by integration". One-time manual
# enablement sidesteps that and unlocks all subsequent deploys.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 20 is being retired from GitHub Actions runners; use
          # the current LTS (Node 24) which Next 16 supports natively.
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check & lint (fail fast on regressions)
        run: |
          npx tsc --noEmit
          npm run lint

      - name: Build static site
        # NODE_ENV=production enables the production bundle (no basePath
        # since the site is served from the custom-domain apex). Inject
        # the production URL so metadataBase resolves to the real domain
        # instead of falling back to localhost.
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://www.song52wow.xyz
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The `out/` directory is the standard Next.js static export
          # output. See `output: "export"` in next.config.ts.
          path: "./out"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://www.song52wow.xyz/
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
